<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoAlert</title>
  <link rel="stylesheet" href="frontend/styles/styles.css">
</head>
<body>

<header class="siteHeader">
  <div class="siteHeaderLeft">
    <a href="#" class="siteHeaderLogo" aria-label="GeoAlert home">
      <img src="frontend/assets/icons/logo.png" alt="GeoAlert logo">
    </a>
  </div>

  <div class="siteHeaderCenter">
    <h1 class="siteHeaderTitle">GeoAlert</h1>
  </div>

  <div class="siteHeaderRight">
    <a href="frontend/ui/alerts.html" class="siteHeaderButton siteHeaderButtonSecondary">Alerts</a>
    <a href="frontend/ui/api/api.html" class="siteHeaderButton siteHeaderButtonSecondary">API</a>
    <a href="frontend/ui/login/login.html" class="siteHeaderButton siteHeaderButtonPrimary">Login</a>
  </div>
</header>

<main class="dashboardPage">
  <section class="dashboardShell">
    <div class="dashboardTopRow">
      <div class="dashboardHeadingWrap">
        <h2 class="dashboardHeading">Current Conditions</h2>

        <div class="dashboardMetaRow">
          <span class="dashboardMetaItem">
          Current City:
          <strong id="zoneName">Hamilton</strong>
          </span>
          <span class="dashboardMetaDivider"></span>
          <span class="dashboardMetaItem">
            Last Updated:
            <strong id="zoneUpdatedAt">10:48 AM</strong>
          </span>
        </div>
      </div>

  <div class="zoneSelectorWrap">
    <label for="zoneSearchInput" class="zoneSelectorLabel">City</label>

    <div class="zoneSelector" id="zoneSelector">
      <input
        type="text"
        id="zoneSearchInput"
        class="zoneSearchInput"
        placeholder="Search city..."
        autocomplete="off"
      >
      <div class="zoneDropdown" id="zoneDropdown"></div>
    </div>
  </div>
    </div>
    <section class="publicAlertsPanel" id="publicAlertsPanel" aria-label="Public alerts">
  <div class="publicAlertsHeader">
    <h3 class="publicAlertsTitle">Public Alerts</h3>
    <span class="publicAlertsCount" id="publicAlertsCount">0</span>
  </div>

  <div class="publicAlertsList" id="publicAlertsList">
    <p class="publicAlertsEmpty">No public alerts right now.</p>
  </div>
</section>

    <section class="gaugeGrid" id="gaugeGrid"></section>
  </section>
</main>

<script type="module" src="frontend/js/script.js"></script>
</body>
</html>
